<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <header class="header-container">
      <section id="title" aria-labelledby="title-heading">
        <span>
          <h2>TIC TAC TOE</h2>
        </span>
      </section>
      <section
        id="edit-player-btn"
        aria-labelledby="edit-player-button-heading"
      >
        <span>
          <button id="editPlayer">Edit Players</button>
        </span>
      </section>
      <section id="new-game-btn" aria-labelledby="new-game-button-heading">
        <span>
          <button id="newGame">New Game</button>
        </span>
      </section>
    </header>
    <main>
      <section id="score" aria-labelledby="score-heading">
        <div class="player">Player 1</div>
        <div class="player">Player 2</div>
        <div class="playerScore">Score: <span>0</span></div>
        <div class="playerScore">Score: <span>0</span></div>
      </section>
      <section id="winnerSection" aria-labelledby="winnerSection-heading">
        <span></span>
      </section>
      <section id="game-board" aria-labelledby="game-board-heading">
        <div class="gaming-board">
          <div class="board-row">
            <div>
              <button data-row="0" data-col="0"></button>
            </div>
            <div>
              <button data-row="0" data-col="1"></button>
            </div>
            <div>
              <button data-row="0" data-col="2"></button>
            </div>
          </div>
          <div class="board-row">
            <div>
              <button data-row="1" data-col="0"></button>
            </div>
            <div>
              <button data-row="1" data-col="1"></button>
            </div>
            <div>
              <button data-row="1" data-col="2"></button>
            </div>
          </div>
          <div class="board-row">
            <div>
              <button data-row="2" data-col="0"></button>
            </div>
            <div>
              <button data-row="2" data-col="1"></button>
            </div>
            <div>
              <button data-row="2" data-col="2"></button>
            </div>
          </div>
        </div>
      </section>
      <section id="player-turn" aria-labelledby="player-turn-heading">
        <span></span>
      </section>

      <!------------EDIT PLAYER'S DATA-------------- -->
      <section id="edit-players" aria-labelledby="edit-players-heading">
        <div class="popup">
          <div class="playerData">
            <span>Player 1</span>
            <input
              class="playerEditedData"
              type="text"
              placeholder="Enter player's name...."
            />
            <input
              class="playerEditedData"
              type="text"
              placeholder="Enter player's sympol...."
            />
          </div>
          <div class="playerData">
            <span>Player 2</span>
            <input
              class="playerEditedData"
              type="text"
              placeholder="Enter player's name...."
            />
            <input
              class="playerEditedData"
              type="text"
              placeholder="Enter player's sympol...."
            />
          </div>
          <div class="saveData">
            <button class="saveBtn">Save</button>
          </div>
          <div class="closeData">
            <button class="closeBtn">Close</button>
          </div>
        </div>
      </section>
      <!-- ------------------------------------------- -->
    </main>
    <footer>
      <span>Created by Chris</span>
    </footer>
    <script src="./index.js"></script>
  </body>
</html>
