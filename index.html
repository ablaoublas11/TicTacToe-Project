<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <header>
      <section id="title" aria-labelledby="title-heading">
        <span>
          <strong>TIC TAC TOE</strong>
        </span>
      </section>
    </header>
    <main>
      <section id="score" aria-labelledby="score-heading">
        <div id="player-board"></div>
      </section>
      <section id="game-board" aria-labelledby="game-board-heading"></section>
      <section id="player-turn" aria-labelledby="player-turn-heading">
        <span>Player X has turn</span>
      </section>
    </main>
    <footer></footer>
    <script src="./script.js"></script>
  </body>
</html>
